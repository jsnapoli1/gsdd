interface:
  display_name: "Deprecated: Use gsdd-execute"
  short_description: "Redirect humans to the gsdd-execute command"
  default_prompt: "If a human invokes $gsdd-execution directly, do not run the implementation workflow. Tell them to use the gsdd-execute command instead. Explain that gsdd-execute is the public entrypoint and gsdd-execution is no longer meant for direct human invocation."

policy:
  allow_implicit_invocation: false
