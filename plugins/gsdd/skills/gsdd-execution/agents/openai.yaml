interface:
  display_name: "GSDD Execution"
  short_description: "Implement plans with TDD and review"
  default_prompt: "Use $gsdd-execution to implement this approved plan with failing tests first and strong review gates. If Codex commands are available in the harness, invoke /codex:rescue for bounded test-first implementation support and /codex:adversarial-review for critique, then report the Codex outcome or an explicit fallback."

policy:
  allow_implicit_invocation: true
